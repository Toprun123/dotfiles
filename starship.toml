# bg: #2c0426

## FIRST LINE/ROW: Info & Status
# First param έΦΑέΦΝ
add_newline = false

[username]
format = " [έΧφέΦΑ](#fa3c3c) [$user]($style)@"
style_user = "bold blue"
style_root = "#fa3c3c"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold yellow"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "bold purple"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "\uea62 "
read_only = " \uf023 "

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "bold red"
ahead = "έΘκ${count}"
diverged = "έΘΧέΘκ${ahead_count}έΘμ${behind_count}"
behind = "έΘμ${count}"

# Last param in the first line/row
[cmd_duration]
style = "bold yellow"
min_time = 1
format = "took [$duration]($style)"
disabled = false

[battery]
disabled = false
full_symbol = "≤▒θλ "
charging_symbol = "≤░ΓΕ "
discharging_symbol = "≤░ΓΔ "
unknown_symbol = "≤░ΓΣ "
empty_symbol= "≤░ΓΟ "
format = " [$symbol$percentage](bold red)\n"

[[battery.display]]
threshold = 25
style = "bold red"

[character]
success_symbol = " [έΧ░έΦΑ](#fa3c3c)[ ╬╗](bold green)"
error_symbol = " [├Ω](#fa3c3c)"

# SYMBOLS
[status]
symbol = "╬╗"
format = ' [έΧ░έΦΑ](#fa3c3c)[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

[jobs]
symbol = "≤░τλ"
format = """ [${symbol}](#CBC3E3)
"""
symbol_threshold = 1

[aws]
symbol = "ΌΝ╜  "

[conda]
symbol = "ΎΕΝ "

[dart]
symbol = "Όηα "

[elixir]
symbol = "ΌΚ╡ "

[elm]
symbol = "Όαυ "

[git_branch]
style="bold green"
symbol = "ΎΡα "

[golang]
symbol = "Όαπ "

[hg_branch]
symbol = "ΎΡα "

[java]
symbol = "ΌΚΨ "

[julia]
