; Main bar
[bar/main]
bottom = false
monitor = ${env:MONITOR:}

line-size = 3

fixed-center = true
override-redirect = true
wm-restack = i3

border-top-size = 7
border-bottom-size = 7
border-color = 152028

padding-left = 1
padding-right = 0

width = 99%
height = 26

offset-x = 0.5%
offset-y = 0.5%

background = 152028
foreground = fff

#tray-position = left

#radius = 3

font-0 = Hurmit Nerd Font:style=Bold:pixelsize=13;3
font-1 = DejaVu Sans Mono:pixelsize=13;3

modules-left = logo space sep space zen space space vscode space space kitty space space yazi space space zoom space space sep space flameshot space sep space caffiene sep space kbd-layout space sep space round-left i3-custom round-right space i3mode
modules-center = temperature-logo space space temperature-val space sep space round-left cpu ram round-right space sep battery
modules-right = round-left netsym net-speed round-right space sep space round-left bt bt-toggle round-right space sep space sound space sep space brightness space round-left time round-right powermenu

; netnamem -- module

locale = en_US.UTF-8

; Modules ->

; Modules for styling

[module/round-left]
type = custom/text
label = ŅéČ
label-foreground = 243341

[module/round-right]
type = custom/text
label = Ņé┤
label-foreground = 243341

[module/space]
type = custom/text
label = " "

[module/sep]
type = custom/text
label = "|"
label-foreground = 416180


; Text module for logo display
[module/logo]
type = custom/text
format = <label>
format-foreground = CF9FFF
label = ’īō
click-left = "~/dotfiles/scripts/run.sh"

[module/zen]
type = custom/text
format-foreground = F86D28
label = ¾░¢¤
click-left = "firefox &"

[module/zoom]
type = custom/text
format-foreground = 0B5CFF
label = ’ĆĮ
click-left = "zoom &"

[module/kitty]
type = custom/text
format-foreground = F6AA36
label = ’Æē
click-left = "kitty &"

[module/yazi]
type = custom/text
format-foreground = a4ebf3
label = ¾░Ø░
click-left = "kitty -e yazi &"

[module/vscode]
type = custom/text
format-foreground = 007bd7
label = ¾░©×
click-left = "code &"

[module/flameshot]
type = custom/text
format-foreground = D17B4D
label = ¾░╣æ
click-left = "maim -l -c 0.3,0.5,1.0,0.8 -s | tee /tmp/screenshot_temp.png | xclip -selection clipboard -t image/png && if [ -s '/tmp/screenshot_temp.png' ]; then mv /tmp/screenshot_temp.png ~/screenshots/$(date +%Y-%m-%d_%H:%M:%S).png; fi"


[module/kbd-layout]
type = custom/script
exec = "~/.config/polybar/kbd.sh"
interval = 0.25
click-left = "~/dotfiles/scripts/kbd.sh"
scroll-down = "~/dotfiles/scripts/kbd.sh"
scroll-up = "~/dotfiles/scripts/kbd.sh up"

[module/caffiene]
type = custom/script
exec = "~/dotfiles/scripts/caffiene.sh"
interval = 0.25
click-left = "~/dotfiles/scripts/caffiene.sh toggle"

[module/temperature-logo]
type = custom/text
label = "Ņ╝½"
format-foreground = a4ebf3

[module/temperature-val]
type = custom/script
exec = acpi -t | awk '{print int($4) "┬░C"}'
interval = 30

[module/time]
type = internal/date
interval = 60
format = <label>
format-background = 243341
date = "%{F#f0d369}’ĆŚ %I:%M %p%{F-}"
time-alt = "%{F#d8a3ff}’ü│ %d/%m/%y%{F-}"
label = %date%%time%


[module/netname]
type = custom/script
exec = ~/.config/polybar/net_name.sh
interval = 10
click-left = ~/dotfiles/scripts/network.sh
format-background = 243341

[module/net-speed]
type = custom/script
exec = ~/.config/polybar/net_speed.sh
interval = 0.4
click-left = ~/dotfiles/scripts/network.sh
format-background = 243341

[module/netsym]
type = custom/script
exec = ~/.config/polybar/net_sym.sh
interval = 1
format-foreground = cba6f7
format-background = 243341
click-left = ~/dotfiles/scripts/network.sh toggle


[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-charging-padding = 1

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full-prefix = " ’ēĆ  "

format-full-prefix-foreground = A0E8A2
format-background = 2b2f37

ramp-capacity-foreground = A0E8A2

ramp-capacity-0 = "’ēä "
ramp-capacity-1 = "’ēā "
ramp-capacity-2 = "’ēé "
ramp-capacity-3 = "’ēü "
ramp-capacity-4 = "’ēĆ "

animation-charging-0 = "’ēä "
animation-charging-1 = "’ēā "
animation-charging-2 = "’ēé "
animation-charging-3 = "’ēü "
animation-charging-4 = "’ēĆ "

animation-charging-foreground = DF8890
animation-charging-framerate = 910
format-discharging-padding = 1


[module/powermenu]
type = custom/text
content ="’Ćæ "
content-padding = 1
click-left = ~/dotfiles/scripts/power.sh
content-foreground = d35f5e

[module/cpu]
type = custom/script
interval = 10
exec = awk -v prev_total=0 -v prev_idle=0 '{if (NR==1){total=$2+$3+$4+$5+$6+$7+$8; idle=$5; usage=(total-prev_total-idle+prev_idle)/(total-prev_total)*100; printf "%d%% | ", int(usage+0.5); prev_total=total; prev_idle=idle}}' < /proc/stat
format-prefix = "’Æ╝ "
format-background = 243341
format-foreground = 989cff
click-left = exec kitty -e btop

[module/ram]
type = custom/script
interval = 10
exec = printf "Ņ┐ģ  %.1fG" $(echo "scale=1;$(free -m|awk '/^Mem:/{print $3}')/1024"|bc)
format-background = 243341
format-foreground = 989cff
click-left = exec kitty -e btop

[module/bt]
type = custom/script
exec = ~/.config/polybar/bt.sh
interval = 0.5
format-background = 243341
format-foreground = 989cff
click-left = blueman-manager

[module/bt-toggle]
type = custom/script
exec = ~/.config/polybar/bt.sh tg
interval = 0.5
format-background = 243341
format-foreground = 989cff
click-left = ~/.config/polybar/bt.sh toggle


[module/i3-custom]
type = custom/script
exec = ~/.config/polybar/i3-ws.sh
interval = 0.1
content-background = 243341
format-background = 243341
enable-scroll = true
scroll-up = "~/dotfiles/scripts/workspaces.sh n"
scroll-down = "~/dotfiles/scripts/workspaces.sh p"
click-left = "~/dotfiles/scripts/workspaces.sh add"
click-right = "~/dotfiles/scripts/workspaces.sh rm"

[module/i3mode]
type = internal/i3
format = "<label-mode>"


[module/sound]
type = custom/script
exec = ~/.config/polybar/sound.sh
interval = 0.5
format-foreground = f1b950
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
enable-scroll = true
scroll-up = "pactl set-sink-volume @DEFAULT_SINK@ +5%;vol=$(pactl get-sink-volume @DEFAULT_SINK@ | grep -o '[0-9]\+%');dunstify 'Volume Adjusted' '' -h int:value:$vol -r 997"
scroll-down = "pactl set-sink-volume @DEFAULT_SINK@ -5%;vol=$(pactl get-sink-volume @DEFAULT_SINK@ | grep -o '[0-9]\+%');dunstify 'Volume Adjusted' '' -h int:value:$vol -r 997"


[module/brightness]
type = custom/script
exec = ~/.config/polybar/brightness.sh
interval = 0.5
format-foreground = fff
enable-scroll = true
scroll-up = brt=$(brightnessctl set +5% | grep % | awk -F'[()]' '{print $2}' | sed 's/%//'); dunstify "Brightness:" "" -h int:value:$brt -r 998
scroll-down = brt=$(brightnessctl set 5%- | grep % | awk -F'[()]' '{print $2}' | sed 's/%//'); dunstify "Brightness:" "" -h int:value:$brt -r 998
